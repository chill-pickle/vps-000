services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    env_file: .env
    environment:
      - N8N_HOST=n8n.chillpickle.org
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.chillpickle.org
      - N8N_EDITOR_BASE_URL=https://n8n.chillpickle.org
    restart: unless-stopped

volumes:
  n8n_data:
