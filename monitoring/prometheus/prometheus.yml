global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'vps-node'
    static_configs:
      - targets: ['node-exporter:9101']
        labels:
          instance: 'vps-000'
          environment: 'production'