name: Setup SSH
description: Configure SSH agent and add VPS to known_hosts

inputs:
  ssh_private_key:
    description: SSH private key
    required: true
  ssh_host:
    description: SSH host to add to known_hosts
    required: true

runs:
  using: composite
  steps:
    - name: Start SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh_private_key }}

    - name: Add VPS to known_hosts
      shell: bash
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${{ inputs.ssh_host }}" >> ~/.ssh/known_hosts
