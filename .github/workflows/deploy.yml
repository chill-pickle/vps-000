name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "traefik/**"
      - "chillang/backend/**"
      - "chillang/docker-compose.yml"
      - "chillang/.env.enc"
      - "chillang/extension/**"
      - "stories/backend/**"
      - "stories/docker-compose.yml"
      - "monitoring/**"
  pull_request:
    branches: [main]
    paths:
      - "traefik/**"
      - "chillang/backend/**"
      - "chillang/docker-compose.yml"
      - "chillang/.env.enc"
      - "chillang/extension/**"
      - "stories/backend/**"
      - "stories/docker-compose.yml"
      - "monitoring/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - traefik
          - chillang-backend
          - chillang-extension
          - stories-backend
          - monitoring

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Detect which parts of the codebase changed
  # -----------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      traefik: ${{ steps.filter.outputs.traefik }}
      chillang-backend: ${{ steps.filter.outputs.chillang-backend }}
      chillang-extension: ${{ steps.filter.outputs.chillang-extension }}
      stories-backend: ${{ steps.filter.outputs.stories-backend }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            traefik:
              - "traefik/**"
            chillang-backend:
              - "chillang/backend/**"
              - "chillang/docker-compose.yml"
              - "chillang/.env.enc"
            chillang-extension:
              - "chillang/extension/**"
            stories-backend:
              - "stories/backend/**"
              - "stories/docker-compose.yml"
            monitoring:
              - "monitoring/**"

  # ===========================================================
  # VALIDATE — runs on both PRs and pushes
  # ===========================================================

  validate-traefik:
    name: Validate Traefik
    needs: changes
    if: >
      needs.changes.outputs.traefik == 'true' ||
      github.event.inputs.service == 'traefik' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sops-install
      - uses: ./.github/actions/sops-decrypt
        with:
          enc_file: traefik/.env.enc
          out_file: traefik/.env
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

  # ===========================================================
  # BUILD
  # ===========================================================

  build-chillang-backend:
    name: Build ChilLang backend
    needs: changes
    if: >
      needs.changes.outputs.chillang-backend == 'true' ||
      github.event.inputs.service == 'chillang-backend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: chillang/backend
          push: true
          tags: |
            ghcr.io/chill-pickle/chillang-api:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && 'ghcr.io/chill-pickle/chillang-api:latest' || '' }}

  build-chillang-extension:
    name: Build ChilLang extension
    needs: changes
    if: >
      needs.changes.outputs.chillang-extension == 'true' ||
      github.event.inputs.service == 'chillang-extension' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chillang/extension/package-lock.json
      - name: Install dependencies
        working-directory: chillang/extension
        run: npm ci
      - name: Build extension
        working-directory: chillang/extension
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: chillang-extension-${{ github.sha }}
          path: chillang/extension/dist/
          retention-days: 30
          if-no-files-found: error

  build-stories-backend:
    name: Build Stories backend
    needs: changes
    if: >
      needs.changes.outputs.stories-backend == 'true' ||
      github.event.inputs.service == 'stories-backend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: stories/backend
          push: true
          tags: |
            ghcr.io/chill-pickle/stories-api:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && 'ghcr.io/chill-pickle/stories-api:latest' || '' }}

  # ===========================================================
  # DEPLOY — only on push to main
  # ===========================================================

  deploy-traefik:
    name: Deploy Traefik
    needs: validate-traefik
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sops-install
      - uses: ./.github/actions/sops-decrypt
        with:
          enc_file: traefik/.env.enc
          out_file: traefik/.env
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}
      - uses: ./.github/actions/ssh-setup
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_host: ${{ secrets.SSH_HOST }}
      - uses: ./.github/actions/deploy-service
        with:
          service_name: traefik
          service_path: traefik/
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_host: ${{ secrets.SSH_HOST }}
          rsync_excludes: "acme/,.env.enc"
          docker_compose_args: "-d --force-recreate"
          sleep_seconds: "5"

  deploy-chillang-backend:
    name: Deploy ChilLang backend
    needs: build-chillang-backend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://api.chillang.chillpickle.org
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/sops-install
      - uses: ./.github/actions/sops-decrypt
        with:
          enc_file: chillang/.env.enc
          out_file: chillang/.env
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}
      - uses: ./.github/actions/ssh-setup
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_host: ${{ secrets.SSH_HOST }}
      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/chillang ~/chillang.bak 2>/dev/null || true"
      - name: Deploy compose + env to server
        run: |
          rsync -avz \
            chillang/docker-compose.yml \
            chillang/.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/chillang/
      - name: Pull image and restart
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            docker logout ghcr.io 2>/dev/null || true
            cd ~/chillang && docker compose pull && docker compose up -d
          ENDSSH
      - uses: ./.github/actions/health-check
        with:
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_host: ${{ secrets.SSH_HOST }}
          service_name: chillang
          health_url: http://localhost:8091/health
      - name: Cleanup backup
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf ~/chillang.bak"

  deploy-stories-backend:
    name: Deploy Stories backend
    needs: build-stories-backend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://stories.chillpickle.org
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ssh-setup
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_host: ${{ secrets.SSH_HOST }}
      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/stories ~/stories.bak 2>/dev/null || true"
      - name: Deploy compose to server
        run: |
          rsync -avz \
            stories/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/stories/
      - name: Pull image and restart
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            docker logout ghcr.io 2>/dev/null || true
            cd ~/stories && docker compose pull && docker compose up -d
          ENDSSH
      - uses: ./.github/actions/health-check
        with:
          ssh_user: ${{ secrets.SSH_USER }}
          ssh_host: ${{ secrets.SSH_HOST }}
          service_name: stories
          health_url: http://localhost:8093/health
      - name: Cleanup backup
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf ~/stories.bak"
