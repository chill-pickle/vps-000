name: Deploy

on:
  push:
    branches: [main]
    paths: ['services/**']
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (traefik/outline/all)'
        required: true
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      traefik: ${{ steps.changes.outputs.traefik }}

      outline: ${{ steps.changes.outputs.outline }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            traefik:
              - 'services/traefik/**'

            outline:
              - 'services/outline/**'

  deploy-traefik:
    needs: detect-changes
    if: needs.detect-changes.outputs.traefik == 'true' || github.event.inputs.service == 'traefik' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install sops + age
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age
      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops -d --input-type dotenv --output-type dotenv services/traefik/.env.enc > services/traefik/.env
      - name: Backup current config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp -r ~/traefik ~/traefik.bak
      - name: Rsync configs to server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          rsync -avz --exclude='acme/' -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            services/traefik/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/traefik/
          rm /tmp/deploy_key
      - name: Restart Traefik + verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/traefik && docker compose up -d --force-recreate
            sleep 5
            if ! docker compose ps --format json | grep -q '"running"'; then
              echo "DEPLOY FAILED — rolling back"
              rm -rf ~/traefik && mv ~/traefik.bak ~/traefik
              cd ~/traefik && docker compose up -d --force-recreate
              exit 1
            fi
            rm -rf ~/traefik.bak

  deploy-outline:
    needs: detect-changes
    if: needs.detect-changes.outputs.outline == 'true' || github.event.inputs.service == 'outline' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install sops + age
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age
      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops -d --input-type dotenv --output-type dotenv services/outline/.env.enc > services/outline/.env
      - name: Backup current config
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: cp -r ~/outline ~/outline.bak 2>/dev/null || true
      - name: Rsync configs to server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          rsync -avz --exclude='data/' -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            services/outline/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/outline/
          rm /tmp/deploy_key
      - name: Restart Outline + verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/outline
            docker compose pull
            docker compose up -d
            sleep 15
            if ! docker compose ps --format json | grep -q '"running"'; then
              echo "DEPLOY FAILED — rolling back"
              rm -rf ~/outline && mv ~/outline.bak ~/outline
              cd ~/outline && docker compose up -d
              exit 1
            fi
            rm -rf ~/outline.bak
