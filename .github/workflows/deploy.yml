name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "traefik/**"
      - "outline/**"
      - "dashy/**"
      - "chillang/backend/**"
      - "chillang/docker-compose.yml"
      - "chillang/.env.enc"
      - "chillang/extension/**"
      - "story/backend/**"
      - "story/docker-compose.yml"
      - "monitoring/**"
  pull_request:
    branches: [main]
    paths:
      - "traefik/**"
      - "outline/**"
      - "dashy/**"
      - "chillang/backend/**"
      - "chillang/docker-compose.yml"
      - "chillang/.env.enc"
      - "chillang/extension/**"
      - "story/backend/**"
      - "story/docker-compose.yml"
      - "monitoring/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - traefik
          - dashy
          - outline
          - chillang-backend
          - chillang-extension
          - story-backend
          - monitoring

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Detect which parts of the codebase changed
  # -----------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      traefik: ${{ steps.filter.outputs.traefik }}
      outline: ${{ steps.filter.outputs.outline }}
      dashy: ${{ steps.filter.outputs.dashy }}
      chillang-backend: ${{ steps.filter.outputs.chillang-backend }}
      chillang-extension: ${{ steps.filter.outputs.chillang-extension }}
      story-backend: ${{ steps.filter.outputs.story-backend }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            traefik:
              - "traefik/**"
            outline:
              - "outline/**"
            dashy:
              - "dashy/**"
            chillang-backend:
              - "chillang/backend/**"
              - "chillang/docker-compose.yml"
              - "chillang/.env.enc"
            chillang-extension:
              - "chillang/extension/**"
            story-backend:
              - "story/backend/**"
              - "story/docker-compose.yml"
            monitoring:
              - "monitoring/**"

  # ===========================================================
  # VALIDATE — runs on both PRs and pushes (no approval needed)
  # ===========================================================

  # -----------------------------------------------------------
  # Validate Traefik config (decrypt secrets)
  # -----------------------------------------------------------
  validate-traefik:
    name: Validate Traefik
    needs: changes
    if: >
      needs.changes.outputs.traefik == 'true' ||
      github.event.inputs.service == 'traefik' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv traefik/.env.enc > traefik/.env

      - name: Validate config
        run: |
          echo "Secrets decrypted successfully"
          test -s traefik/.env && echo "traefik/.env is non-empty" || exit 1

  # -----------------------------------------------------------
  # Validate Outline config (decrypt secrets)
  # -----------------------------------------------------------
  validate-outline:
    name: Validate Outline
    needs: changes
    if: >
      needs.changes.outputs.outline == 'true' ||
      github.event.inputs.service == 'outline' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv outline/.env.enc > outline/.env

      - name: Validate config
        run: |
          echo "Secrets decrypted successfully"
          test -s outline/.env && echo "outline/.env is non-empty" || exit 1

  # -----------------------------------------------------------
  # Build ChilLang backend Docker image
  # -----------------------------------------------------------
  build-chillang-backend:
    name: Build ChilLang backend
    needs: changes
    if: >
      needs.changes.outputs.chillang-backend == 'true' ||
      github.event.inputs.service == 'chillang-backend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: chillang/backend
          push: true
          tags: |
            ghcr.io/chill-pickle/chillang-api:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && 'ghcr.io/chill-pickle/chillang-api:latest' || '' }}

  # -----------------------------------------------------------
  # Build Chrome extension (artifact only)
  # -----------------------------------------------------------
  build-chillang-extension:
    name: Build ChilLang extension
    needs: changes
    if: >
      needs.changes.outputs.chillang-extension == 'true' ||
      github.event.inputs.service == 'chillang-extension' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chillang/extension/package-lock.json

      - name: Install dependencies
        working-directory: chillang/extension
        run: npm ci

      - name: Build extension
        working-directory: chillang/extension
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: chillang-extension-${{ github.sha }}
          path: chillang/extension/dist/
          retention-days: 30
          if-no-files-found: error

  # ===========================================================
  # DEPLOY — only on push to main (requires environment approval)
  # ===========================================================

  # -----------------------------------------------------------
  # Deploy Traefik reverse proxy
  # -----------------------------------------------------------
  deploy-traefik:
    name: Deploy Traefik
    needs: validate-traefik
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv traefik/.env.enc > traefik/.env

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/traefik ~/traefik.bak 2>/dev/null || true"

      - name: Rsync to server
        run: |
          rsync -avz --delete \
            --exclude='acme/' \
            --exclude='.env.enc' \
            traefik/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/traefik/

      - name: Restart and verify
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            cd ~/traefik && docker compose up -d --force-recreate
            sleep 5
            if ! docker compose ps --format json | grep -q '"running"'; then
              echo "DEPLOY FAILED — rolling back"
              rm -rf ~/traefik && mv ~/traefik.bak ~/traefik
              cd ~/traefik && docker compose up -d --force-recreate
              exit 1
            fi
            rm -rf ~/traefik.bak
          ENDSSH

  # -----------------------------------------------------------
  # Deploy Outline wiki
  # -----------------------------------------------------------
  deploy-outline:
    name: Deploy Outline
    needs: validate-outline
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv outline/.env.enc > outline/.env

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/outline ~/outline.bak 2>/dev/null || true"

      - name: Rsync to server
        run: |
          rsync -avz --delete \
            --exclude='data/' \
            --exclude='.env.enc' \
            outline/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/outline/

      - name: Restart and verify
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            cd ~/outline
            docker compose pull
            docker compose up -d
            sleep 15
            if ! docker compose ps --format json | grep -q '"running"'; then
              echo "DEPLOY FAILED — rolling back"
              rm -rf ~/outline && mv ~/outline.bak ~/outline
              cd ~/outline && docker compose up -d
              exit 1
            fi
            rm -rf ~/outline.bak
          ENDSSH

  # -----------------------------------------------------------
  # Deploy Dashy dashboard
  # -----------------------------------------------------------
  deploy-dashy:
    name: Deploy Dashy
    needs: changes
    if: >
      (needs.changes.outputs.dashy == 'true' || github.event.inputs.service == 'dashy' || github.event.inputs.service == 'all') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/dashy ~/dashy.bak 2>/dev/null || true"

      - name: Rsync to server
        run: |
          rsync -avz --delete \
            dashy/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/dashy/

      - name: Restart and verify
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            cd ~/dashy
            docker compose pull
            docker compose up -d
            sleep 10
            if ! docker compose ps --format json | grep -q '"running"'; then
              echo "DEPLOY FAILED — rolling back"
              rm -rf ~/dashy && mv ~/dashy.bak ~/dashy
              cd ~/dashy && docker compose up -d
              exit 1
            fi
            rm -rf ~/dashy.bak
          ENDSSH

  # -----------------------------------------------------------
  # Deploy ChilLang backend to VPS
  # -----------------------------------------------------------
  deploy-chillang-backend:
    name: Deploy ChilLang backend
    needs: build-chillang-backend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://api.chillang.chillpickle.org
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x sops-v3.9.4.linux.amd64 && sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops
          sudo apt-get install -y age

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops -d --input-type dotenv --output-type dotenv chillang/.env.enc > chillang/.env

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/chillang ~/chillang.bak 2>/dev/null || true"

      - name: Deploy compose + env to server
        run: |
          rsync -avz \
            chillang/docker-compose.yml \
            chillang/.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/chillang/

      - name: Pull image and restart
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            docker logout ghcr.io 2>/dev/null || true
            cd ~/chillang
            docker compose pull
            docker compose up -d
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for service to become ready..."
          sleep 15
          for i in 1 2 3 4 5 6; do
            STATUS=$(ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8091/health" 2>/dev/null || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed — rolling back"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            rm -rf ~/chillang && mv ~/chillang.bak ~/chillang
            cd ~/chillang && docker compose up -d
          ENDSSH
          exit 1

      - name: Cleanup backup
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf ~/chillang.bak"

  # -----------------------------------------------------------
  # Build TODO API backend Docker image
  # -----------------------------------------------------------
  build-story-backend:
    name: Build Story backend
    needs: changes
    if: >
      needs.changes.outputs.story-backend == 'true' ||
      github.event.inputs.service == 'story-backend' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: story/backend
          push: true
          tags: |
            ghcr.io/chill-pickle/story-api:${{ github.sha }}
            ${{ github.event_name != 'pull_request' && 'ghcr.io/chill-pickle/story-api:latest' || '' }}

  # -----------------------------------------------------------
  # Deploy TODO API backend to VPS
  # -----------------------------------------------------------
  deploy-story-backend:
    name: Deploy Story backend
    needs: build-story-backend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://story.chillpickle.org
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backup current config
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cp -r ~/story ~/story.bak 2>/dev/null || true"

      - name: Deploy compose to server
        run: |
          rsync -avz \
            story/docker-compose.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/story/

      - name: Pull image and restart
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            docker logout ghcr.io 2>/dev/null || true
            cd ~/story
            docker compose pull
            docker compose up -d
          ENDSSH

      - name: Health check
        run: |
          echo "Waiting for service to become ready..."
          sleep 15
          for i in 1 2 3 4 5 6; do
            STATUS=$(ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8093/health" 2>/dev/null || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed — rolling back"
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            rm -rf ~/story && mv ~/story.bak ~/story
            cd ~/story && docker compose up -d
          ENDSSH
          exit 1

      - name: Cleanup backup
