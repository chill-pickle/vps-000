name: Telegram Notify

on:
  workflow_run:
    workflows: [Deploy, Security]
    types: [completed]

jobs:
  notify:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          REPO="${{ github.event.workflow_run.repository.full_name }}"
          COMMIT_MSG=$(echo "${{ github.event.workflow_run.head_commit.message }}" | head -1)

          if [ "$CONCLUSION" = "success" ]; then
            STATUS_ICON="✅"
          elif [ "$CONCLUSION" = "failure" ]; then
            STATUS_ICON="❌"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            STATUS_ICON="⚠️"
          else
            STATUS_ICON="ℹ️"
          fi

          if [ "$WORKFLOW" = "Deploy" ]; then
            TYPE_ICON="🚀"
          elif [ "$WORKFLOW" = "Security" ]; then
            TYPE_ICON="🔒"
          else
            TYPE_ICON="⚙️"
          fi

          TEXT="${TYPE_ICON} *${WORKFLOW}* ${STATUS_ICON} ${CONCLUSION}
          \`${BRANCH}\` · [${SHORT_SHA}](${RUN_URL}) · ${ACTOR}
          ${COMMIT_MSG}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true \
            -d text="${TEXT}"
