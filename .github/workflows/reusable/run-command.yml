name: Reusable Run Remote Command

on:
  workflow_call:
    inputs:
      command:
        required: true
        type: string
      ssh_host:
        required: true
        type: string
      ssh_user:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-key-scan: ${{ secrets.SSH_HOST }}

      - name: Run command
        run: |
          ssh ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} "${{ inputs.command }}"