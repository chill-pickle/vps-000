name: Reusable Deploy Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      docker_compose_command:
        required: false
        type: string
        default: "up -d"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USER:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-key-scan: ${{ secrets.SSH_HOST }}

      - name: Deploy service
        run: |
          rsync -r ${{ inputs.service_path }}/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/${{ inputs.service_name }}/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/${{ inputs.service_name }} && docker compose ${{ inputs.docker_compose_command }}"