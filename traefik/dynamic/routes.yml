http:
  routers:
    outline:
      rule: "Host(`outline.chillpickle.org`)"
      entryPoints: [websecure]
      service: outline

    chillang-api:
      rule: "Host(`api.chillang.chillpickle.org`)"
      entryPoints: [websecure]
      service: chillang-api

    dashy:
      rule: "Host(`dash.chillpickle.org`)"
      entryPoints: [websecure]
      service: dashy

    story-api:
      rule: "Host(`story.chillpickle.org`)"
      entryPoints: [websecure]
      service: story-api

    traefik-dashboard:
      rule: "Host(`traefik.tcom.chillpickle.org`)"
      entryPoints: [websecure]
      service: api@internal
      middlewares:
        - dashboard-auth

  services:
    outline:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8089"

    chillang-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8091"

    dashy:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8092"

    story-api:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8093"
