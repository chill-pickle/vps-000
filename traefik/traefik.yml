api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "outline.chillpickle.org"
          - main: "dash.chillpickle.org"
          - main: "story.chillpickle.org"
          - main: "grafana.chillpickle.org"
          - main: "n8n.chillpickle.org"
          - main: "chillpickle.org"
            sans:
              - "*.chillang.chillpickle.org"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "Code.maito@gmail.com"
      storage: "/acme/acme.json"
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 10
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

providers:
  file:
    directory: "/dynamic"
    watch: true

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
