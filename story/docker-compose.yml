services:
  story-api:
    image: ghcr.io/chill-pickle/story-api:latest
    container_name: story_api
    restart: unless-stopped
    ports:
      - "8093:8093"
    volumes:
      - story_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  story_data:
